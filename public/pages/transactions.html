<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Transaction History</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: #f5f6fa; }
.container { margin-top: 40px; }
</style>
</head>

<body>

<div class="container">

<h1 class="mb-4">Transaction History</h1>

<a href="/index.html" class="btn btn-secondary mb-3">⬅ Back to Dashboard</a>

<table class="table table-bordered">
<thead>
<tr>
    <th>Date</th>
    <th>Product</th>
    <th>Type</th>
    <th>Quantity</th>
</tr>
</thead>

<tbody id="table-body"></tbody>
</table>

</div>

<script>

if (!localStorage.getItem("token")) {
    window.location.href = "/pages/login.html";
}

let TOKEN = localStorage.getItem("token");

// Load transactions
async function loadTransactions() {
    try {
        let res = await fetch("http://localhost:8080/api/products/transactions", {
            headers: {
                Authorization: "Bearer " + TOKEN
            }
        });

        let data = await res.json();

        console.log("Transactions:", data);

        render(data);

    } catch (err) {
        console.error("Error loading transactions:", err);
    }
}

// Render
function render(transactions) {
    let tbody = document.getElementById("table-body");
    tbody.innerHTML = "";

    transactions.forEach(t => {
        let date = new Date(t.createdAt).toLocaleString();

        tbody.innerHTML += `
        <tr>
            <td>${date}</td>
            <td>${t.product ? t.product.name : "Deleted Product"}</td>
            <td>${t.type}</td>
            <td>${t.quantity}</td>
        </tr>`;
    });
}

// Start
loadTransactions();

</script>

</body>
</html>
