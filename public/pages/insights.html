<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insights</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/style.css">

<style>
body { background: #f5f6fa; font-family: Arial; }

.card {
    margin-bottom: 15px;
}

.section-title {
    margin: 22px 0 10px;
}
</style>
</head>

<body>

<div class="container">
    <div id="sidebar-placeholder"></div>
    <div class="main-content">

    <h2 class="mb-3">Advanced Retail AI Insights</h2>

    <div id="insightsContainer"></div>

    </div>
</div>

<script src="/js/sidebar.js"></script>
<script>

// 🔐 Auth check
if (!localStorage.getItem("token")) {
    window.location.href = "/pages/login.html";
}

const TOKEN = localStorage.getItem("token");
const INSIGHT_SECTIONS = [
    "Demand Forecast",
    "Trend Analysis",
    "Smart Offer Suggestions",
];

async function loadInsights() {
    try {
        const res = await fetch("http://localhost:8080/api/insights", {
            headers: {
                "Authorization": "Bearer " + TOKEN
            }
        });

        const data = await res.json();

        console.log("Insights:", data); // ✅ DEBUG

        const container = document.getElementById("insightsContainer");
        container.innerHTML = "";

        if (!Array.isArray(data) || data.length === 0) {
            container.innerHTML = "<p>No insights available.</p>";
            return;
        }

        INSIGHT_SECTIONS.forEach(section => {
            const sectionInsights = data.filter(i => (i.section || "Demand Forecast") === section);
            if (!sectionInsights.length) return;

            container.innerHTML += `<h4 class="section-title">${section}</h4>`;

            sectionInsights.forEach(i => {

                let color = "secondary";

                if (i.priority === "High") color = "danger";
                else if (i.priority === "Medium") color = "warning";
                else if (i.priority === "Low") color = "success";

                container.innerHTML += `
                    <div class="card border-${color}">
                        <div class="card-body">
                            <h6><b>${i.title || i.type || "Insight"}</b></h6>
                            <p>${i.message || ""}</p>
                            <span class="badge bg-${color}">${i.priority || "Low"}</span>
                        </div>
                    </div>
                `;
            });
        });

    } catch (err) {
        console.log("ERROR:", err);
        document.getElementById("insightsContainer").innerHTML =
            "<p style='color:red;'>Failed to load insights</p>";
    }
}

// 🚀 Run
loadSidebar("insights");
loadInsights();

</script>

</body>
</html>
