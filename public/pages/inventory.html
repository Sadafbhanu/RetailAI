<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inventory - Retail AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: #f5f6fa; font-family: Arial; }
.container { margin-top: 40px; }

.expiry-dot {
    height: 10px;
    width: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-left: 6px;
}
.expiring { background-color: orange; }
.expired { background-color: red; }

/* Modal */
.modal-bg {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.5);
}
.modal-box {
    background:white;
    padding:20px;
    width:320px;
    margin:100px auto;
    border-radius:10px;
}
</style>
</head>

<body>

    <div class="container">

<a href="/index.html" class="btn btn-secondary mb-3">⬅ Back</a>

<h1 class="mb-4">📦 Inventory</h1>


<table class="table table-bordered">
<thead>
<tr>
<th>Name</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
<th>Expiry</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="table-body"></tbody>
</table>

</div>

<!-- ✅ SELL MODAL -->
<div id="sellModal" class="modal-bg">
    <div class="modal-box">
        <h5>Sell Product</h5>
        <input type="number" id="sellQty" class="form-control mb-3" placeholder="Enter quantity">
        <button class="btn btn-success w-100 mb-2" onclick="confirmSell()">Confirm</button>
        <button class="btn btn-secondary w-100" onclick="closeSellModal()">Cancel</button>
    </div>
</div>

<!-- ✅ RESTOCK MODAL -->
<div id="restockModal" class="modal-bg">
    <div class="modal-box">
        <h5>Restock Product</h5>

        <input type="number" id="restockQty" class="form-control mb-2" placeholder="Quantity">
        <input type="number" id="restockPrice" class="form-control mb-2" placeholder="Price">
        <input type="date" id="restockExpiry" class="form-control mb-3">

        <button class="btn btn-success w-100 mb-2" onclick="confirmRestock()">Confirm</button>
        <button class="btn btn-secondary w-100" onclick="closeRestockModal()">Cancel</button>
    </div>
</div>

<script>

let TOKEN = localStorage.getItem("token");
let products = [];

let selectedSellIndex = null;
let selectedRestockIndex = null;

// Load
async function loadProducts() {
    let res = await fetch("http://localhost:8080/api/products", {
        headers: { Authorization: "Bearer " + TOKEN }
    });

    products = await res.json();
    render();
}

// ---------------- SELL ----------------
function openSellModal(index) {
    selectedSellIndex = index;
    document.getElementById("sellQty").value = "";
    document.getElementById("sellModal").style.display = "block";
}

function closeSellModal() {
    document.getElementById("sellModal").style.display = "none";
}

async function confirmSell() {
    let qty = parseInt(document.getElementById("sellQty").value);
    let p = products[selectedSellIndex];

    if (!qty || qty <= 0) return alert("Invalid quantity");
    if (qty > p.quantity) return alert("Not enough stock");

    await fetch(`http://localhost:8080/api/products/${p._id}/sell`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + TOKEN
        },
        body: JSON.stringify({ quantity: qty })
    });

    closeSellModal();
    loadProducts();
}

// ---------------- RESTOCK ----------------
function openRestockModal(index) {
    selectedRestockIndex = index;

    document.getElementById("restockQty").value = "";
    document.getElementById("restockPrice").value = "";
    document.getElementById("restockExpiry").value = "";

    document.getElementById("restockModal").style.display = "block";
}

function closeRestockModal() {
    document.getElementById("restockModal").style.display = "none";
}

async function confirmRestock() {
    let qty = parseInt(document.getElementById("restockQty").value);
    let price = parseInt(document.getElementById("restockPrice").value);
    let expiryDate = document.getElementById("restockExpiry").value;

    let p = products[selectedRestockIndex];

    if (!qty || qty <= 0) return alert("Invalid quantity");
    if (!price || price <= 0) return alert("Invalid price");
    if (!expiryDate) return alert("Select expiry date");

    await fetch(`http://localhost:8080/api/products/${p._id}/restock`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + TOKEN
        },
        body: JSON.stringify({
            quantity: qty,
            price: price,
            expiryDate: expiryDate
        })
    });

    closeRestockModal();
    loadProducts();
}

// ---------------- RENDER ----------------
function render() {
    let tbody = document.getElementById("table-body");
    tbody.innerHTML = "";

    const today = new Date();
    today.setHours(0,0,0,0);

    products.forEach((p, i) => {
        let total = p.quantity * p.price;
        let expiry = p.expiryDate ? p.expiryDate.split("T")[0] : "-";

        let isExpired = false;
        let dotClass = "";

        if (p.expiryDate) {
            let expDate = new Date(p.expiryDate);
            expDate.setHours(0,0,0,0);

            let diffDays = (expDate - today) / (1000*60*60*24);

            if (diffDays < 0) {
                isExpired = true;
                dotClass = "expired";
            } else if (diffDays <= 3) {
                dotClass = "expiring";
            }
        }

        let sellBtn = isExpired ? "" :
            `<button class="btn btn-warning btn-sm" onclick="openSellModal(${i})">Sell</button>`;

        tbody.innerHTML += `
        <tr>
            <td>${p.name}</td>
            <td>${p.quantity}</td>
            <td>${p.price}</td>
            <td>₹${total}</td>
            <td>${expiry} ${dotClass ? `<span class="expiry-dot ${dotClass}"></span>` : ""}</td>
            <td>
                ${sellBtn}
                <button class="btn btn-success btn-sm" onclick="openRestockModal(${i})">Restock</button>
                <button class="btn btn-danger btn-sm" onclick="deleteProduct(${i})">Delete</button>
            </td>
        </tr>`;
    });
}

// Delete
async function deleteProduct(index) {
    let p = products[index];

    if (!confirm("Delete?")) return;

    await fetch(`http://localhost:8080/api/products/${p._id}`, {
        method: "DELETE",
        headers: { Authorization: "Bearer " + TOKEN }
    });

    loadProducts();
}

// Start
loadProducts();

</script>

</body>
</html>
