<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inventory - Retail AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: #f5f6fa; font-family: Arial; }
.container { margin-top: 40px; }
.table-danger { background-color: #ffcccc !important; }
</style>
</head>

<body>

<div class="container">

<h2>📦 Inventory</h2>

<div class="mb-3">
<a href="/index.html" class="btn btn-secondary me-2">⬅ Back</a>
<button class="btn btn-success me-2" onclick="toggleForm()">➕ Add Item</button>

<input type="file" id="fileInput" accept=".csv" hidden onchange="handleFileUpload(event)">
<button class="btn btn-primary me-2" onclick="fileInput.click()">📂 Upload File</button>

<button class="btn btn-dark" onclick="startVoiceInput()">🎤 Speak</button>
</div>

<div id="product-form" class="card p-4 mb-4" style="display:none;">
<input id="name" class="form-control mb-2" placeholder="Product Name">
<input id="quantity" class="form-control mb-2" placeholder="Quantity">
<input id="price" class="form-control mb-2" placeholder="Price">
<input id="minThreshold" class="form-control mb-2" placeholder="Min Stock">
<input id="expiryDate" type="date" class="form-control mb-2">

<button class="btn btn-primary" onclick="addProduct()">Add Product</button>
<p id="msg" class="text-danger mt-2"></p>
</div>

<table class="table table-bordered">
<thead>
<tr>
<th>Name</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
<th>Min Stock</th>
<th>Expiry</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="table-body"></tbody>
</table>

</div>

<script>

// 🔐 Auth check
if (!localStorage.getItem("token")) {
    window.location.href = "/pages/login.html";
}

let TOKEN = localStorage.getItem("token");
let products = [];

// Toggle form
function toggleForm() {
    let form = document.getElementById("product-form");
    form.style.display = form.style.display === "none" ? "block" : "none";
}

// Load products
async function loadProducts() {
    let res = await fetch("http://localhost:8080/api/products", {
        headers: { Authorization: "Bearer " + TOKEN }
    });

    let data = await res.json();
    products = data;
    render();
}

// Add product (FIXED IDs)
async function addProduct() {
    let name = document.getElementById("name").value;
    let quantity = parseInt(document.getElementById("quantity").value);
    let price = parseInt(document.getElementById("price").value);
    let minThreshold = parseInt(document.getElementById("minThreshold").value);
    let expiryDate = document.getElementById("expiryDate").value;

    if (!name || isNaN(quantity)) return;

    await fetch("http://localhost:8080/api/products", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + TOKEN
        },
        body: JSON.stringify({ name, quantity, price, minThreshold, expiryDate })
    });

    loadProducts();
}

// 🎤 Voice
async function processVoiceCommand(text) {
    let numbers = text.match(/\d+/g);
    let quantity = numbers ? parseInt(numbers[0]) : 1;
    let price = numbers && numbers[1] ? parseInt(numbers[1]) : 10;

    let name = text.replace(/\d+/g, "").replace("add", "").replace("price", "").trim();
    if (!name) return;

    await fetch("http://localhost:8080/api/products", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + TOKEN
        },
        body: JSON.stringify({
            name,
            quantity,
            price,
            minThreshold: 5,
            expiryDate: new Date().toISOString()
        })
    });

    loadProducts();
}

function startVoiceInput() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return alert("Not supported");

    const recognition = new SpeechRecognition();
    recognition.start();

    recognition.onresult = e => {
        processVoiceCommand(e.results[0][0].transcript);
    };
}

// 📂 CSV Upload
async function handleFileUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append("file", file);

    await fetch("http://localhost:8080/api/products/upload", {
        method: "POST",
        headers: { Authorization: "Bearer " + TOKEN },
        body: formData
    });

    loadProducts();
}

// Sell
async function sellProduct(index) {
    let p = products[index];

    await fetch(`http://localhost:8080/api/products/${p._id}/sell`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + TOKEN
        },
        body: JSON.stringify({ quantity: 1 })
    });

    loadProducts();
}

// Restock
async function restockProduct(index) {
    let p = products[index];

    await fetch(`http://localhost:8080/api/products/${p._id}/restock`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + TOKEN
        },
        body: JSON.stringify({ quantity: 1 })
    });

    loadProducts();
}

// ❌ DELETE (FULLY FIXED)
async function deleteProduct(index) {
    let p = products[index];

    console.log("Deleting ID:", p._id);

    if (!confirm("Delete this product?")) return;

    try {
        let res = await fetch(`http://localhost:8080/api/products/${p._id}`, { 
            method: "DELETE",
            headers: {
                "Authorization": "Bearer " + localStorage.getItem("token")
            }
        });

        let data = await res.json();

        if (!res.ok) {
            console.error("Delete error:", data);
            alert(data.error || "Delete failed");
            return;
        }

        alert("Deleted successfully");
        loadProducts();

    } catch (err) {
        console.log("ERROR:", err);
    }
}
// Render
function render() {
    let tbody = document.getElementById("table-body");
    tbody.innerHTML = "";

    products.forEach((p, i) => {
        let total = (p.quantity || 0) * (p.price || 0);
        let expiry = p.expiryDate ? p.expiryDate.split("T")[0] : "-";
        let danger = p.quantity < (p.minThreshold || 0) ? "table-danger" : "";

        tbody.innerHTML += `
        <tr class="${danger}">
            <td>${p.name}</td>
            <td>${p.quantity}</td>
            <td>${p.price}</td>
            <td>₹${total}</td>
            <td>${p.minThreshold || 0}</td>
            <td>${expiry}</td>
            <td>
                <button class="btn btn-warning btn-sm" onclick="sellProduct(${i})">Sell</button>
                <button class="btn btn-success btn-sm" onclick="restockProduct(${i})">Restock</button>
                <button class="btn btn-danger btn-sm" onclick="deleteProduct(${i})">Delete</button>
            </td>
        </tr>`;
    });
}

// Start
loadProducts();

</script>

</body>
</html>
