<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Retail AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #6a5af9, #8e44ad);
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card */
.signup-card {
    width: 100%;
    max-width: 400px;
    background: white;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* Heading */
.signup-title {
    text-align: center;
    font-weight: 600;
    margin-bottom: 20px;
}

/* Inputs */
.form-control {
    border-radius: 10px;
    padding: 10px;
}

/* Button */
.signup-btn {
    background: linear-gradient(135deg, #6a5af9, #8e44ad);
    border: none;
    border-radius: 25px;
    padding: 10px;
    font-weight: 500;
    transition: 0.3s;
}

.signup-btn:hover {
    opacity: 0.9;
}

/* Bottom text */
.bottom-text {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
}
</style>

</head>

<body>

<div class="signup-card">

    <h3 class="signup-title">Create Account</h3>

    <input type="text" id="name" class="form-control mb-3" placeholder="Full Name">

    <input type="email" id="email" class="form-control mb-3" placeholder="Email address">

    <input type="password" id="password" class="form-control mb-3" placeholder="Password">

    <button class="btn signup-btn w-100" onclick="signup()">Sign Up</button>

    <div class="bottom-text">
        Already have an account?
        <a href="login.html">Login</a>
    </div>

    <p id="msg" class="text-danger text-center mt-2"></p>

</div>

<script>
function signup() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    if (!name || !email || !pass) {
        document.getElementById("msg").innerText = "Please fill all fields";
        return;
    }

    // Save user (simple)
    localStorage.setItem("user", name);

    alert("Signup successful!");
    window.location.href = "login.html";
}
</script>

</body>
</html>
