<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inventory - Retail AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: #f5f6fa; font-family: Arial; }
.container { margin-top: 40px; }
.table-danger { background-color: #ffcccc !important; }
</style>
</head>

<body>

<div class="container">

<h2>📦 Inventory</h2>

<!-- 🔘 BUTTONS -->
<div class="mb-3">

<a href="index.html" class="btn btn-secondary me-2">⬅ Back</a>

<button class="btn btn-success me-2" onclick="toggleForm()">➕ Add Item</button>

<!-- 📂 FILE UPLOAD -->
<input type="file" id="fileInput" accept=".csv,.txt" hidden onchange="handleFileUpload(event)">
<button class="btn btn-primary me-2" onclick="document.getElementById('fileInput').click()">📂 Upload File</button>

<!-- 🎤 MIC -->
<button class="btn btn-dark" onclick="startVoiceInput()">🎤 Speak</button>

</div>

<!-- 🧾 FORM -->
<div id="product-form" class="card p-4 mb-4" style="display:none;">

<input id="name" class="form-control mb-2" placeholder="Product Name">
<input id="quantity" class="form-control mb-2" placeholder="Quantity">
<input id="price" class="form-control mb-2" placeholder="Price">
<input id="minThreshold" class="form-control mb-2" placeholder="Min Stock">
<input id="expiryDate" type="date" class="form-control mb-2">

<button class="btn btn-primary" onclick="addProduct()">Add Product</button>

<p id="msg" class="text-danger mt-2"></p>

</div>

<!-- 📊 TABLE -->
<table class="table table-bordered">
<thead>
<tr>
<th>Name</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
<th>Min Stock</th> <!-- ✅ NEW -->
<th>Expiry</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="table-body"></tbody>
</table>

</div>

<script>


// 🔐 Protect page
if (!localStorage.getItem("token")) {
    window.location.href = "/pages/login.html";
}

let TOKEN = localStorage.getItem("token");
let products = [];

// 🔽 TOGGLE FORM
function toggleForm() {
    let form = document.getElementById("product-form");
    form.style.display = (form.style.display === "none") ? "block" : "none";
}

// 🔄 LOAD PRODUCTS
async function loadProducts() {
    try {
        let res = await fetch("http://localhost:8080/api/products", {
            headers: {
                "Authorization": "Bearer " + TOKEN
            }
        });

        let data = await res.json();
        products = data;
        render();

    } catch (err) {
        document.getElementById("msg").innerText = "Failed to load products!";
    }
}

// ➕ ADD PRODUCT
async function addProduct() {

    let name = document.getElementById("name").value;
    let quantity = parseInt(document.getElementById("quantity").value);
    let price = parseInt(document.getElementById("price").value);
    let minThreshold = parseInt(document.getElementById("minThreshold").value);
    let expiryDate = document.getElementById("expiryDate").value;

    if (!name || isNaN(quantity)) return;

    try {
        await fetch("http://localhost:8080/api/products", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + TOKEN
            },
            body: JSON.stringify({
                name,
                quantity,
                price,
                minThreshold,
                expiryDate
            })
        });

        loadProducts();

        document.getElementById("product-form").style.display = "none";

    } catch (err) {
        document.getElementById("msg").innerText = "API Error!";
    }
}

// 📂 FILE UPLOAD
function handleFileUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e) {
        parseFile(e.target.result);
    };

    reader.readAsText(file);
}

// 📊 PARSE FILE
function parseFile(content) {

    let lines = content.split("\n");

    lines.forEach(line => {
        let [name, qty, price] = line.split(",");

        if (!name || !qty || !price) return;

        products.push({
            name: name.trim(),
            quantity: parseInt(qty),
            price: parseInt(price),
            minThreshold: 5,
            expiryDate: new Date().toISOString()
        });
    });

    render();
}

//////////////////////////////////////////////////////
// 🎤 VOICE INPUT (FIXED VERSION)
//////////////////////////////////////////////////////

function startVoiceInput() {

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        alert("Speech Recognition not supported");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.interimResults = false;

    recognition.start();

    recognition.onstart = () => {
        console.log("🎤 Listening...");
    };

    recognition.onresult = function(event) {
        let text = event.results[0][0].transcript;
        console.log("You said:", text);

        processVoiceCommand(text);
    };

    recognition.onerror = (err) => {
        console.log("Mic error:", err);
    };
}

// 🧠 SMART VOICE PARSER
function processVoiceCommand(text) {

    text = text.toLowerCase();

    let numbers = text.match(/\d+/g);

    let quantity = numbers ? parseInt(numbers[0]) : 1;
    let price = numbers && numbers.length > 1 ? parseInt(numbers[1]) : 10;

    let name = text
        .replace(/\d+/g, "")
        .replace("add", "")
        .replace("price", "")
        .trim();

    if (!name) {
        alert("Could not detect product name");
        return;
    }

    products.push({
        name,
        quantity,
        price,
        minThreshold: 5,
        expiryDate: new Date().toISOString()
    });

    render();
}

//////////////////////////////////////////////////////

// 🔻 SELL
function sellProduct(index) {
    if (products[index].quantity > 0) {
        products[index].quantity -= 1;
        render();
    }
}

// 🔺 RESTOCK
function restockProduct(index) {
    products[index].quantity += 1;
    render();
}

// ❌ DELETE
function deleteProduct(index) {
    products.splice(index, 1);
    render();
}

// 🔄 RENDER
function render() {

    let tbody = document.getElementById("table-body");
    tbody.innerHTML = "";

    products.forEach((p, i) => {

        let qty = p.quantity || 0;
        let price = p.price || 0;
        let total = qty * price;

        let expiry = p.expiryDate ? p.expiryDate.split("T")[0] : "-";

        let rowClass = "";
        if (qty < (p.minThreshold || 0)) {
            rowClass = "table-danger";
        }

        tbody.innerHTML += `
        <tr class="${rowClass}">
            <td>${p.name}</td>
            <td>${qty}</td>
            <td>${price}</td>
            <td>₹${total}</td>
            <td>${p.minThreshold || 0}</td>
            <td>${expiry}</td>
            <td>
                <button class="btn btn-warning btn-sm me-2" onclick="sellProduct(${i})">Sell</button>
                <button class="btn btn-success btn-sm me-2" onclick="restockProduct(${i})">Restock</button>
                <button class="btn btn-danger btn-sm" onclick="deleteProduct(${i})">Delete</button>
            </td>
        </tr>`;
    });
}

// 🚀 START
loadProducts();

</script>
