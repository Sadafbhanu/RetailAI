<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RetailAI Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/style.css">

<style>
body {
    background: #f5f6fa;
    font-family: Arial;
}

/* Cards */
.card-box {
    border-radius: 15px;
    padding: 20px;
    background: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);

    height: 130px; /* ✅ SAME HEIGHT */
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.blue { border-left: 5px solid #4e73df; }
.orange { border-left: 5px solid #f6c23e; }
.green { border-left: 5px solid #1cc88a; }

.card-title {
    font-size: 14px;
    color: gray;
}

.card-value {
    font-size: 28px;
    font-weight: bold;
}

small {
    font-size: 12px;
    color: #666;
}

/* Header */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Profile Dropdown */
.profile-wrapper {
    position: relative;
}

.profile-menu {
    display: none;
    position: absolute;
    right: 0;
    top: 45px;
    background: white;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 10px;
}

.clickable-card {
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
<div id="sidebar-placeholder"></div>

<!-- Main -->
<div class="main-content">

    <div class="topbar">
        <h2>Dashboard</h2>

        <div class="profile-wrapper">
            <button onclick="toggleProfileMenu(event)" class="btn btn-light">
                👤 Profile
            </button>

            <div id="profileMenu" class="profile-menu">
                <button onclick="logout()" class="btn btn-danger w-100">
                    Logout
                </button>
            </div>
        </div>
    </div>

    <!-- Cards -->
    <div class="row mt-4">

        <!-- Total Value -->
        <div class="col-md-4">
            <div class="card-box blue">
                <div class="card-title">Total Inventory Value</div>
                <div class="card-value" id="totalValue">0</div>
                <small>&nbsp;</small>
            </div>
        </div>

        <!-- Alerts -->
        <div class="col-md-4">
            <div class="card-box orange clickable-card" onclick="window.location.href='/pages/alerts.html'">
                <div class="card-title">Critical Alerts</div>
                <div class="card-value" id="alerts">0</div>
                <small id="alertBreakdown"></small>
            </div>
        </div>

        <!-- Products -->
        <div class="col-md-4">
            <div class="card-box green">
                <div class="card-title">Total Products</div>
                <div class="card-value" id="products">0</div>
                <small>&nbsp;</small>
            </div>
        </div>

    </div>

</div>
</div>

<script src="/js/sidebar.js"></script>
<script>

// 🔐 Protect page
if (!localStorage.getItem("token")) {
    window.location.href = "/pages/login.html";
}

let TOKEN = localStorage.getItem("token");

// 📊 Load dashboard data
async function loadDashboard() {
    try {
        let res = await fetch("http://localhost:8080/api/products", {
            headers: {
                "Authorization": "Bearer " + TOKEN
            }
        });

        let data = await res.json();

        let totalValue = 0;
        let lowStockCount = 0;
        let expiredCount = 0;

        const today = new Date();
        today.setHours(0,0,0,0);

        data.forEach(p => {
            let qty = p.quantity || 0;
            let price = p.price || 0;

            totalValue += qty * price;

            if (qty < (p.minThreshold || 0)) {
                lowStockCount++;
            }

            if (p.expiryDate) {
                let expDate = new Date(p.expiryDate);
                expDate.setHours(0,0,0,0);

                if (expDate < today) {
                    expiredCount++;
                }
            }
        });

        document.getElementById("totalValue").innerText = totalValue;
        document.getElementById("alerts").innerText = lowStockCount + expiredCount;
        document.getElementById("products").innerText = data.length;

        document.getElementById("alertBreakdown").innerText =
            `${lowStockCount} Low Stock, ${expiredCount} Expired`;

    } catch (err) {
        console.log(err);
    }
}

// Toggle dropdown
function toggleProfileMenu(e) {
    e.stopPropagation();
    let menu = document.getElementById("profileMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

// Logout
function logout() {
    localStorage.removeItem("token");
    window.location.href = "/pages/login.html";
}

// Close dropdown
document.addEventListener("click", function(e) {
    if (!e.target.closest(".profile-wrapper")) {
        document.getElementById("profileMenu").style.display = "none";
    }
});

// Start
loadSidebar("dashboard");
loadDashboard();

</script>

</body>
</html>
