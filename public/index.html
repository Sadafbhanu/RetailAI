<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RetailAI Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/style.css">

<style>
body {
    background: #f5f6fa;
    font-family: Arial;
}

/* Cards */
.card-box {
    border-radius: 15px;
    padding: 20px;
    background: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);

    height: 130px; /* ✅ SAME HEIGHT */
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.blue { border-left: 5px solid #4e73df; }
.orange { border-left: 5px solid #f6c23e; }
.green { border-left: 5px solid #1cc88a; }

.card-title {
    font-size: 14px;
    color: gray;
}

.card-value {
    font-size: 28px;
    font-weight: bold;
}

small {
    font-size: 12px;
    color: #666;
}

/* Header */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Profile Dropdown */
.profile-wrapper {
    position: relative;
}

.profile-menu {
    display: none;
    position: absolute;
    right: 0;
    top: 45px;
    background: white;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 10px;
}

.clickable-card {
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
<div id="sidebar-placeholder"></div>

<!-- Main -->
<div class="main-content">

    <div class="topbar">
        <h2>Dashboard</h2>

        <div class="profile-wrapper">
            <button onclick="toggleProfileMenu(event)" class="btn btn-light">
                👤 Profile
            </button>

            <div id="profileMenu" class="profile-menu">
                <button onclick="logout()" class="btn btn-danger w-100">
                    Logout
                </button>
            </div>
        </div>
    </div>

    <!-- Cards -->
    <div class="row mt-4">

        <!-- Total Value -->
        <div class="col-md-6">
            <div class="card-box blue">
                <div class="card-title">Total Inventory Value</div>
                <div class="card-value" id="totalValue">0</div>
                <small>&nbsp;</small>
            </div>
        </div>

        <!-- Products -->
        <div class="col-md-6">
            <div class="card-box green">
                <div class="card-title">Total Products</div>
                <div class="card-value" id="products">0</div>
                <small>&nbsp;</small>
            </div>
        </div>

    </div>

    <div class="mt-4">
        <h4>Top Sold Items</h4>
        <table class="table table-bordered mt-3">
            <thead>
                <tr>
                    <th>Product Name</th>
                    <th>Quantity Sold</th>
                    <th>Quantity Left</th>
                    <th>Profit Made</th>
                </tr>
            </thead>
            <tbody id="topSoldTable"></tbody>
        </table>
    </div>

</div>
</div>

<script src="/js/sidebar.js"></script>
<script>

// 🔐 Protect page
if (!localStorage.getItem("token")) {
    window.location.href = "/pages/login.html";
}

let TOKEN = localStorage.getItem("token");

// 📊 Load dashboard data
async function loadDashboard() {
    try {
        let res = await fetch("http://localhost:8080/api/products", {
            headers: {
                "Authorization": "Bearer " + TOKEN
            }
        });
        let txRes = await fetch("http://localhost:8080/api/products/transactions", {
            headers: {
                "Authorization": "Bearer " + TOKEN
            }
        });

        let data = await res.json();
        let transactions = await txRes.json();

        let totalValue = 0;
        let productMap = {};
        let salesMap = {};

        data.forEach(p => {
            let qty = p.quantity || 0;
            let price = p.price || 0;

            totalValue += qty * price;
            productMap[p._id] = p;
        });

        const now = new Date();
        const oneWeekAgo = new Date(now);
        oneWeekAgo.setDate(now.getDate() - 7);

        transactions.forEach(t => {
            if (t.type !== "Sale" || !t.product || !t.product._id) return;
            if (!t.createdAt) return;
            const txDate = new Date(t.createdAt);
            if (txDate < oneWeekAgo) return;

            const id = t.product._id;
            if (!salesMap[id]) {
                salesMap[id] = {
                    name: t.product.name || "Unknown Product",
                    quantitySold: 0,
                    profit: 0
                };
            }
            salesMap[id].quantitySold += Number(t.quantity || 0);

            const price = Number(t.product.price || 0);
            const cost = Number(t.product.costPrice ?? (price * 0.7));
            salesMap[id].profit += (price - cost) * Number(t.quantity || 0);
        });

        const topSold = Object.entries(salesMap)
            .map(([id, stats]) => ({
                ...stats,
                quantityLeft: Number(productMap[id]?.quantity || 0)
            }))
            .sort((a, b) => b.quantitySold - a.quantitySold)
            .slice(0, 10);

        const topSoldTable = document.getElementById("topSoldTable");
        topSoldTable.innerHTML = "";
        if (topSold.length === 0) {
            topSoldTable.innerHTML = `<tr><td colspan="4">No sales data available for last 7 days.</td></tr>`;
        } else {
            topSold.forEach(item => {
                topSoldTable.innerHTML += `
                    <tr>
                        <td>${item.name}</td>
                        <td>${item.quantitySold}</td>
                        <td>${item.quantityLeft}</td>
                        <td>₹${item.profit.toFixed(2)}</td>
                    </tr>
                `;
            });
        }

        document.getElementById("totalValue").innerText = totalValue;
        document.getElementById("products").innerText = data.length;

    } catch (err) {
        console.log(err);
    }
}

// Toggle dropdown
function toggleProfileMenu(e) {
    e.stopPropagation();
    let menu = document.getElementById("profileMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

// Logout
function logout() {
    localStorage.removeItem("token");
    window.location.href = "/pages/login.html";
}

// Close dropdown
document.addEventListener("click", function(e) {
    if (!e.target.closest(".profile-wrapper")) {
        document.getElementById("profileMenu").style.display = "none";
    }
});

// Start
loadSidebar("dashboard");
loadDashboard();

</script>

</body>
</html>
