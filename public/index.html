<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Retail AI Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { font-family: Arial; }

.sidebar {
    width: 220px;
    height: 100vh;
    background: #212529;
    color: white;
    position: fixed;
}

.sidebar .nav-link {
    color: white;
    padding: 10px;
    display: block;
    text-decoration: none;
}

.sidebar .nav-link:hover {
    background: #343a40;
}

.main-content {
    margin-left: 220px;
    padding: 20px;
}
</style>
</head>

<body>

<div class="d-flex">

<!-- Sidebar -->
<div class="sidebar p-3">
    <h4> Retail AI</h4>
    <hr>

    <a href="#" class="nav-link" onclick="showView('dashboard')">Dashboard</a>

    <!-- 🔥 CONNECTED HERE -->
    <a href="inventory.html" class="nav-link">Inventory</a>

    <a href="#" class="nav-link" onclick="showView('insights')">Insights</a>
</div>

<!-- Main -->
<div class="main-content flex-grow-1">

<h2>Dashboard</h2>

<div class="row mt-4">
    <div class="col-md-4">
        <div class="card bg-primary text-white p-3">
            Total Value: ₹<span id="total">0</span>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card bg-warning p-3">
            Low Stock: <span id="low">0</span>
        </div>
    </div>
</div>

<div id="insights" class="d-none mt-4">
    <h3>Insights</h3>
    <p>No insights yet</p>
</div>

</div>
</div>

<script>
function showView(view) {
    document.getElementById("insights").classList.toggle("d-none", view !== "insights");
}
</script>

</body>
</html>
