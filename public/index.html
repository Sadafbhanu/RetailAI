<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RetailAI Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f5f6fa;
    font-family: Arial;
}

/* Sidebar */
.sidebar {
    width: 230px;
    height: 100vh;
    background: #1e1e2f;
    color: white;
    position: fixed;
    padding: 20px;
}

.sidebar h2 {
    font-weight: bold;
    color: white;
}

.sidebar a {
    display: block;
    margin: 12px 0;
    color: #cbd5e1;
    text-decoration: none;
    padding: 10px;
    border-radius: 8px;
}

.sidebar a:hover {
    background: #2a2a40;
    color: white;
}

.sidebar a.active {
    background: #4e73df;
    color: white;
}

/* Main */
.main {
    margin-left: 250px;
    padding: 30px;
}

/* Cards */
.card-box {
    border-radius: 15px;
    padding: 20px;
    background: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.blue { border-left: 5px solid #4e73df; }
.orange { border-left: 5px solid #f6c23e; }
.green { border-left: 5px solid #1cc88a; }

.card-title {
    font-size: 14px;
    color: gray;
}

.card-value {
    font-size: 28px;
    font-weight: bold;
}

/* Header */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* 🔥 Profile Dropdown */
.profile-wrapper {
    position: relative;
}

.profile-menu {
    display: none;
    position: absolute;
    right: 0;
    top: 45px;
    background: white;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 10px;
    min-width: 120px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    z-index: 999;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2> RetailAI</h2>

    <a href="#" class="active"> Dashboard</a>
    <a href="/pages/inventory.html"> Inventory Ledger</a> 
    <a href="/pages/transactions.html"> Transactions</a>
    <a href="#"> Insights</a>
</div>

<!-- Main -->
<div class="main">

    <div class="topbar">
        <h2>Dashboard</h2>

        <!-- ✅ PROFILE DROPDOWN -->
        <div class="profile-wrapper">
            <button onclick="toggleProfileMenu(event)" class="btn btn-light">
                👤 Profile
            </button>

            <div id="profileMenu" class="profile-menu">
                <button onclick="logout()" class="btn btn-danger w-100">
                    Logout
                </button>
            </div>
        </div>
    </div>

    <!-- Cards -->
    <div class="row mt-4">

        <div class="col-md-4">
            <div class="card-box blue">
                <div class="card-title">Total Inventory Value</div>
                <div class="card-value" id="totalValue">0</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-box orange">
                <div class="card-title">Critical Alerts</div>
                <div class="card-value" id="alerts">0</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-box green">
                <div class="card-title">Total Products</div>
                <div class="card-value" id="products">0</div>
            </div>
        </div>

    </div>

</div>

<script>

// 🔐 Protect page
if (!localStorage.getItem("token")) {
    window.location.href = "/pages/login.html";
}

let TOKEN = localStorage.getItem("token");

// 📊 Load dashboard data
async function loadDashboard() {
    try {
        let res = await fetch("http://localhost:8080/api/products", {
            headers: {
                "Authorization": "Bearer " + TOKEN
            }
        });

        let data = await res.json();

        let totalValue = 0;
        let alerts = 0;

        data.forEach(p => {
            let qty = p.quantity || 0;
            let price = p.price || 0;

            totalValue += qty * price;

            if (qty < (p.minThreshold || 0)) {
                alerts++;
            }
        });

        document.getElementById("totalValue").innerText = totalValue;
        document.getElementById("alerts").innerText = alerts;
        document.getElementById("products").innerText = data.length;

    } catch (err) {
        console.log(err);
    }
}

// ✅ Toggle dropdown
function toggleProfileMenu(e) {
    e.stopPropagation();

    let menu = document.getElementById("profileMenu");

    menu.style.display = menu.style.display === "block"
        ? "none"
        : "block";
}

// ✅ Logout
function logout() {
    localStorage.removeItem("token");
    alert("Logged out successfully");
    window.location.href = "/pages/login.html";
}

// ✅ Close when clicking outside
document.addEventListener("click", function(e) {
    if (!e.target.closest(".profile-wrapper")) {
        document.getElementById("profileMenu").style.display = "none";
    }
});

// 🚀 Start
loadDashboard();

</script>

</body>
</html>
